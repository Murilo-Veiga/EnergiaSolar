server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA sem router de servidor — qualquer rota cai no index.html, o
    # React decide o que mostrar client-side (ver App.tsx, sem react-router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
