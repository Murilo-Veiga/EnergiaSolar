server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy pra api-go (mesmo docker-compose network, hostname "api" =
    # nome do serviço) — o browser só fala com a própria origem
    # (localhost:8090, IP do servidor, o que for), nunca com um hostname
    # fixado em build-time (ver comentário em src/lib/api.ts). O header
    # Authorization (Bearer token) passa direto, sem alteração.
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA sem router de servidor — qualquer rota cai no index.html, o
    # React decide o que mostrar client-side (ver App.tsx, sem react-router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
