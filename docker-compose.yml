services:
  postgres:
    image: postgres:16-alpine
    container_name: solar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-solarhome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-solarhome}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: ./api-go
    container_name: solar-api
    restart: unless-stopped
    ports:
      - "8091:8000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-solarhome}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-solarhome}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}
    depends_on:
      - postgres

  collector:
    build: ./api-go
    container_name: solar-collector
    restart: unless-stopped
    entrypoint: collector
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-solarhome}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-solarhome}?sslmode=disable
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}
    depends_on:
      - postgres

  web:
    build:
      context: ./web
    container_name: solar-web
    restart: unless-stopped
    ports:
      - "8090:8000"
    depends_on:
      - api

volumes:
  postgres-data:
